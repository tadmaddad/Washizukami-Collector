# config.yaml — Washizukami (washi.exe) カスタム設定
#
# このファイルを washi.exe と同じフォルダに配置すると読み込まれます。
# 配置しない場合は内蔵デフォルト定義がすべて収集されます。
#
# 優先順位: CLI フラグ > config.yaml > 内蔵デフォルト
#
# ─────────────────────────────────────────────────────────────────────────────
# セクション 1: フィルタ
# ─────────────────────────────────────────────────────────────────────────────
#
# enabled_artifacts — 収集するアーティファクト名をホワイトリストで指定。
#   空または省略した場合はすべてのアーティファクトが対象になります。
#   大文字小文字は区別しません。
#
# 内蔵定義の名前一覧:
#   [EventLogs]
#     - Security Event Log
#     - System Event Log
#     - Application Event Log
#   [Registry]
#     - SAM Registry Hive
#     - SECURITY Registry Hive
#     - SOFTWARE Registry Hive
#     - SYSTEM Registry Hive
#     - Amcache.hve
#     - User NTUSER.DAT
#     - User UsrClass.dat
#   [NTFS]
#     - $MFT
#     - $SECURE:$SDS
#     - $UsnJrnl:$J
#   [Filesystem]
#     - Prefetch Files
#     - Recent LNK Files
#   [WMI]
#     - WMI Repository OBJECTS.DATA
#     - WMI Repository INDEX.BTR
#     - WMI Repository MAPPING Files
#   [SRUM]
#     - SRUM Database
#   [Web]
#     - Chrome History
#     - Firefox places.sqlite
#     - Firefox cookies.sqlite
#     - IE/Edge WebCacheV01.dat
#     - Edge History

# enabled_artifacts:
#   - "Security Event Log"
#   - "System Event Log"
#   - "SAM Registry Hive"
#   - "SYSTEM Registry Hive"
#   - "SOFTWARE Registry Hive"

# disabled_categories — カテゴリ単位で除外。
#   有効な値: EventLogs / Registry / NTFS / Filesystem / WMI / SRUM / Web（大文字小文字不問）
#   enabled_artifacts よりも後に評価されるため、ホワイトリストで明示した
#   アーティファクトもカテゴリが無効化されていれば除外されます。

# disabled_categories:
#   - Filesystem

# ─────────────────────────────────────────────────────────────────────────────
# セクション 2: カスタムアーティファクト定義
# ─────────────────────────────────────────────────────────────────────────────
#
# artifacts — 内蔵定義にないアーティファクトを追加します。
#   内蔵定義と同じ name を指定した場合は、カスタム定義が優先（上書き）されます。
#
# 各エントリの必須フィールド:
#   name        : 一意な表示名（CLIの --artifact や enabled_artifacts から参照可能）
#   category    : グループ名（出力フォルダ名にも使用される）
#   target_path : 収集対象パス。%VAR% 形式の環境変数とグロブ(*,?) が使用可能
#   method      : File（通常コピー）または NTFS（MFT 直接読み取り、ロック回避）

# artifacts:
#   - name: "My Application Log"
#     category: "Custom"
#     target_path: "C:\\MyApp\\logs\\app.log"
#     method: File
#
#   - name: "My Application DB"
#     category: "Custom"
#     target_path: "C:\\MyApp\\data\\app.db"
#     method: NTFS
#
#   - name: "All XML Configs"
#     category: "Custom"
#     target_path: "C:\\MyApp\\config\\*.xml"
#     method: File
