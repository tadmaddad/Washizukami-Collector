# config.yaml — Washizukami (washi.exe) custom configuration
#
# Place this file in the same folder as washi.exe to have it loaded automatically.
# If omitted, all built-in artifact definitions will be collected.
#
# Priority: CLI flags > config.yaml > built-in defaults
#
# ─────────────────────────────────────────────────────────────────────────────
# Section 1: Filters
# ─────────────────────────────────────────────────────────────────────────────
#
# enabled_artifacts — whitelist of artifact names to collect.
#   If empty or omitted, all artifacts are collected.
#   Matching is case-insensitive.
#
# Built-in artifact names:
#   [EventLogs]
#     - Security Event Log
#     - System Event Log
#     - Application Event Log
#   [Registry]
#     - SAM Registry Hive
#     - SECURITY Registry Hive
#     - SOFTWARE Registry Hive
#     - SYSTEM Registry Hive
#     - Amcache.hve
#     - User NTUSER.DAT
#     - User UsrClass.dat
#   [NTFS]
#     - $MFT
#     - $SECURE:$SDS
#     - $UsnJrnl:$J
#   [Filesystem]
#     - Prefetch Files
#     - Recent LNK Files
#   [WMI]
#     - WMI Repository OBJECTS.DATA
#     - WMI Repository INDEX.BTR
#     - WMI Repository MAPPING Files
#   [SRUM]
#     - SRUM Database
#   [Web]
#     - Chrome History
#     - Firefox places.sqlite
#     - Firefox cookies.sqlite
#     - IE/Edge WebCacheV01.dat
#     - Edge History

# enabled_artifacts:
#   - "Security Event Log"
#   - "System Event Log"
#   - "SAM Registry Hive"
#   - "SYSTEM Registry Hive"
#   - "SOFTWARE Registry Hive"

# disabled_categories — exclude entire categories from collection.
#   Valid values: EventLogs / Registry / NTFS / Filesystem / WMI / SRUM / Web (case-insensitive)
#   Evaluated after enabled_artifacts, so an artifact explicitly whitelisted will still
#   be excluded if its category is disabled.

# disabled_categories:
#   - Filesystem

# ─────────────────────────────────────────────────────────────────────────────
# Section 2: Custom artifact definitions
# ─────────────────────────────────────────────────────────────────────────────
#
# artifacts — add artifacts not covered by the built-in definitions.
#   If a custom entry shares the same name as a built-in one, the custom
#   definition takes priority (override).
#
# Required fields per entry:
#   name        : unique display name (referenced by --artifact and enabled_artifacts)
#   category    : group name (also used as the output subfolder name)
#   target_path : path to collect. Supports %VAR% environment variables and glob wildcards (* and ?)
#   method      : File (standard OS copy) or NTFS (direct MFT read, bypasses file locks)

# artifacts:
#   - name: "My Application Log"
#     category: "Custom"
#     target_path: "C:\\MyApp\\logs\\app.log"
#     method: File
#
#   - name: "My Application DB"
#     category: "Custom"
#     target_path: "C:\\MyApp\\data\\app.db"
#     method: NTFS
#
#   - name: "All XML Configs"
#     category: "Custom"
#     target_path: "C:\\MyApp\\config\\*.xml"
#     method: File

# ─────────────────────────────────────────────────────────────────────────────
# Example: Microsoft Outlook .pst files
# ─────────────────────────────────────────────────────────────────────────────
#
# Conditions: Japanese Windows + Classic Outlook (not New Outlook) + OneDrive enabled
#
# When OneDrive is enabled, Classic Outlook stores .pst files under the
# Japanese "Documents" folder name inside the OneDrive folder:
#   C:\Users\<username>\OneDrive\ドキュメント\Outlook ファイル\*.pst
#
# method: NTFS is recommended because Outlook locks .pst files while running.
# Direct MFT access bypasses the lock and allows collection without closing Outlook.
#
# Note: .pst files can be several GB in size.
#       Use --dry-run first to check file sizes before collecting.

# artifacts:
#   - name: "Outlook PST Files"
#     category: "Mail"
#     target_path: "C:\\Users\\*\\OneDrive\\ドキュメント\\Outlook ファイル\\*.pst"
#     method: NTFS
